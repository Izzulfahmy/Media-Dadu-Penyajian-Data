<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayo Main Lempar Dadu! 🎲</title>
    
    <!-- Favicon Logo (Pastikan file Logo.png ada di folder yang sama) -->
    <link rel="icon" href="Logo.png" type="image/png">
    
    <!-- Google Fonts: Nunito (Ramah anak) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                }
            }
        }
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* =========================================
           DICE 3D STYLES
           ========================================= */
        .dice-scene {
            width: 100px; 
            height: 100px;
            perspective: 800px; 
            margin: 2rem auto;
            position: relative; 
            z-index: 50; 
        }

        .dice-scaler {
            width: 100%;
            height: 100%;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .dice-cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: rotateX(0deg) rotateY(0deg);
        }

        .dice-face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: #ffffff;
            border: 4px solid #e2e8f0; /* Border tebal seperti mainan plastik */
            border-radius: 20px; 
            box-shadow: 
                inset 0 0 15px rgba(0,0,0,0.05), 
                inset 0 0 5px rgba(255,255,255,1),
                0 6px 0 rgba(203, 213, 225, 0.4); 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 12px;
            justify-items: center;
            align-items: center;
            backface-visibility: hidden;
            background-color: #f8fafc; 
        }

        .dice-face.front  { transform: rotateY(0deg) translateZ(50px); }
        .dice-face.right  { transform: rotateY(90deg) translateZ(50px); }
        .dice-face.back   { transform: rotateY(180deg) translateZ(50px); }
        .dice-face.left   { transform: rotateY(-90deg) translateZ(50px); }
        .dice-face.top    { transform: rotateX(90deg) translateZ(50px); }
        .dice-face.bottom { transform: rotateX(-90deg) translateZ(50px); }

        .pip {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.3);
        }
        
        /* Warna-warni Titik Dadu */
        .face-1 .pip { grid-area: 2 / 2 / 3 / 3; background: #ff4757; width: 28px; height: 28px; }
        .face-2 .pip { background: #1e90ff; } .face-2 .p1 { grid-area: 1 / 3 / 2 / 4; } .face-2 .p2 { grid-area: 3 / 1 / 4 / 2; }
        .face-3 .pip { background: #2ed573; } .face-3 .p1 { grid-area: 1 / 3 / 2 / 4; } .face-3 .p2 { grid-area: 2 / 2 / 3 / 3; } .face-3 .p3 { grid-area: 3 / 1 / 4 / 2; }
        .face-4 .pip { background: #ffa502; } .face-4 .p1 { grid-area: 1 / 1 / 2 / 2; } .face-4 .p2 { grid-area: 1 / 3 / 2 / 4; } .face-4 .p3 { grid-area: 3 / 1 / 4 / 2; } .face-4 .p4 { grid-area: 3 / 3 / 4 / 4; }
        .face-5 .pip { background: #9c88ff; } .face-5 .p1 { grid-area: 1 / 1 / 2 / 2; } .face-5 .p2 { grid-area: 1 / 3 / 2 / 4; } .face-5 .p3 { grid-area: 2 / 2 / 3 / 3; } .face-5 .p4 { grid-area: 3 / 1 / 4 / 2; } .face-5 .p5 { grid-area: 3 / 3 / 4 / 4; }
        .face-6 .pip { background: #ff7f50; } .face-6 .p1 { grid-area: 1 / 1 / 2 / 2; } .face-6 .p2 { grid-area: 2 / 1 / 3 / 2; } .face-6 .p3 { grid-area: 3 / 1 / 4 / 2; } .face-6 .p4 { grid-area: 1 / 3 / 2 / 4; } .face-6 .p5 { grid-area: 2 / 3 / 3 / 4; } .face-6 .p6 { grid-area: 3 / 3 / 4 / 4; }

        /* =========================================
           CUSTOM SCROLLBAR
           ========================================= */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #a5b4fc; border-radius: 10px; border: 2px solid #f1f5f9; }
        ::-webkit-scrollbar-thumb:hover { background: #818cf8; }

        /* =========================================
           CINEMATIC MODE STYLES
           ========================================= */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(30, 58, 138, 0.85); 
            backdrop-filter: blur(5px);
            z-index: 9000; 
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.4s ease;
        }
        
        #overlay.active { opacity: 1; pointer-events: auto; }

        .dice-scene.cinematic {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            margin: 0; 
        }

        .dice-scaler.cinematic-scale { transform: scale(3) translateY(0); }

        @media (max-width: 640px) {
            .dice-scaler.cinematic-scale { transform: scale(2.2) translateY(0); }
        }

        /* =========================================
           TOY BUTTON (Tombol Mainan)
           ========================================= */
        .toy-btn {
            box-shadow: 0 6px 0 #d97706; 
            transition: all 0.1s;
        }
        .toy-btn:active {
            box-shadow: 0 0px 0 #d97706; 
            transform: translateY(6px); 
        }
        .toy-btn:disabled {
            box-shadow: 0 2px 0 #d97706;
            transform: translateY(4px);
            opacity: 0.8;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-cyan-100 via-blue-50 to-purple-100 min-h-screen text-slate-800 antialiased selection:bg-yellow-300">

    <!-- OVERLAY LAYAR BURAM -->
    <div id="overlay"></div>

    <!-- FILTER TAMPILAN (KIRI ATAS) -->
    <div class="fixed top-3 left-3 sm:top-5 sm:left-5 z-[100] bg-white/90 backdrop-blur-md border-2 border-indigo-200 p-2 sm:px-4 sm:py-2.5 rounded-2xl shadow-md hover:bg-indigo-50 transition-all flex items-center gap-1 sm:gap-2">
        <span class="hidden md:inline text-sm font-bold text-indigo-800">👀 Tampilan:</span>
        <select id="view-filter" onchange="toggleViewFilter()" class="bg-transparent text-indigo-700 text-xs sm:text-sm font-black outline-none cursor-pointer appearance-none text-center pr-2">
            <option value="both">Tabel & Grafik 📊</option>
            <option value="chart">Hanya Grafik 📈</option>
            <option value="table">Hanya Tabel 📝</option>
        </select>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-500 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" /></svg>
    </div>

    <!-- TOMBOL LAYAR PENUH (KANAN ATAS) -->
    <button onclick="toggleFullScreen()" class="fixed top-3 right-3 sm:top-5 sm:right-5 z-[100] bg-white/90 backdrop-blur-md border-2 border-indigo-200 text-indigo-700 p-2 sm:px-4 sm:py-2.5 rounded-2xl shadow-md hover:bg-indigo-50 font-black flex items-center gap-2 transition-all">
        <svg id="fs-icon-enter" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
        <svg id="fs-icon-exit" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 14h6m0 0v6m0-6l-7 7m17-11h-6m0 0V4m0 6l7-7M4 10h6m0 0V4m0 6l-7-7m17 11h-6m0 0v6m0-6l7 7" /></svg>
        <span id="fs-text" class="hidden sm:inline tracking-wide">Layar Penuh</span>
    </button>

    <div class="max-w-6xl mx-auto py-4 px-4 sm:px-8 lg:py-6">
        
        <header class="mb-6 lg:mb-8 text-center pt-14 sm:pt-0 relative z-10">
            <h1 class="text-3xl sm:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-purple-500 to-pink-500 drop-shadow-sm tracking-tight mb-2 sm:mb-3">
                Ayo Main Lempar Dadu! 🎲
            </h1>
            <p class="text-slate-600 text-base sm:text-xl font-bold max-w-2xl mx-auto bg-white/50 inline-block px-4 py-1.5 sm:px-6 sm:py-2 rounded-full shadow-sm border border-white">
                Pencet tombolnya dan lihat keajaibannya! ✨
            </p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8 items-start relative z-10">
            
            <!-- KOLOM KIRI: Dadu -->
            <section class="lg:col-span-4 lg:sticky lg:top-4 bg-white rounded-[2rem] shadow-xl border-4 border-indigo-100 p-5 sm:p-6 flex flex-col justify-between overflow-hidden">
                <div class="flex flex-col items-center">
                    
                    <!-- AREA JUDUL UJI COBA & BADGE JUMLAH LEMPARAN (DIPINDAHKAN KE SINI) -->
                    <div class="w-full flex items-center justify-between mb-2">
                        <div class="text-xs font-bold text-indigo-400 uppercase tracking-wider">Area Uji Coba</div>
                        <div class="bg-cyan-100 text-cyan-800 text-xs sm:text-sm font-black px-3 py-1 rounded-xl flex items-center gap-1.5 border-2 border-cyan-200 shadow-sm">
                            🏆 <span id="total-rolls-badge">0 Kali</span>
                        </div>
                    </div>

                    <div id="dice-placeholder" style="width: 100px; height: 100px; margin: 2rem auto; display: none;"></div>
                    
                    <div id="dice-scene" class="dice-scene">
                        <div id="dice-scaler" class="dice-scaler">
                            <div id="dice-cube" class="dice-cube">
                                <div class="dice-face front face-1"><div class="pip"></div></div>
                                <div class="dice-face right face-2"><div class="pip p1"></div><div class="pip p2"></div></div>
                                <div class="dice-face top face-3"><div class="pip p1"></div><div class="pip p2"></div><div class="pip p3"></div></div>
                                <div class="dice-face bottom face-4"><div class="pip p1"></div><div class="pip p2"></div><div class="pip p3"></div><div class="pip p4"></div></div>
                                <div class="dice-face left face-5"><div class="pip p1"></div><div class="pip p2"></div><div class="pip p3"></div><div class="pip p4"></div><div class="pip p5"></div></div>
                                <div class="dice-face back face-6"><div class="pip p1"></div><div class="pip p2"></div><div class="pip p3"></div><div class="pip p4"></div><div class="pip p5"></div><div class="pip p6"></div></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="h-14 flex items-center justify-center w-full mt-2 mb-5 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-2xl border-2 border-indigo-100 shadow-inner">
                        <span id="result-text" class="text-sm sm:text-base font-bold text-indigo-400">
                            Pencet tombol di bawah 👇
                        </span>
                    </div>

                    <button id="roll-btn" onclick="rollDice()" class="toy-btn w-full py-3 sm:py-4 bg-yellow-400 hover:bg-yellow-300 text-yellow-900 font-black rounded-2xl flex items-center justify-center gap-3 text-xl sm:text-2xl border-2 border-yellow-500">
                        🚀 LEMPAR DADU!
                    </button>
                </div>

                <hr class="border-indigo-100 border-dashed border-2 my-5">

                <button onclick="resetData()" class="w-full py-2 sm:py-3 bg-white hover:bg-red-50 text-red-500 font-bold rounded-2xl transition-colors flex items-center justify-center gap-2 border-2 border-red-200 text-sm sm:text-base shadow-sm hover:border-red-400">
                    🗑️ Mulai Dari Awal
                </button>
            </section>

            <!-- KOLOM KANAN: Visualisasi Data -->
            <section class="lg:col-span-8 flex flex-col gap-6">
                
                <!-- Grafik Batang -->
                <div id="chart-container" class="bg-white rounded-[2rem] shadow-xl border-4 border-cyan-300 p-6 sm:p-8 block relative overflow-hidden">
                    <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-cyan-50 rounded-full opacity-50 blur-2xl"></div>
                    <div class="flex items-center justify-between mb-6 relative z-10">
                        <div>
                            <h2 class="text-xl sm:text-2xl font-black text-cyan-700">Grafik Balok Warna-Warni</h2>
                            <p class="text-xs sm:text-sm font-bold text-cyan-500 mt-1">Siapa yang paling tinggi?</p>
                        </div>
                    </div>
                    <div class="w-full h-[220px] sm:h-[250px] relative z-10">
                        <canvas id="frequencyChart"></canvas>
                    </div>
                </div>

                <!-- Tabel Turus -->
                <div id="table-container" class="bg-white rounded-[2rem] shadow-xl border-4 border-pink-300 overflow-hidden block">
                    <div class="px-4 sm:px-5 py-3 border-b-4 border-pink-100 bg-pink-50">
                        <h2 class="text-lg sm:text-xl font-black text-pink-600">Papan Skor Turus</h2>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="min-w-full text-sm sm:text-base text-left">
                            <thead class="bg-white text-pink-400 font-black border-b-2 border-pink-100">
                                <tr>
                                    <th scope="col" class="px-4 sm:px-6 py-2 w-20 sm:w-24 text-center">Angka</th>
                                    <th scope="col" class="px-4 sm:px-6 py-2">Turus</th>
                                    <th scope="col" class="px-4 sm:px-6 py-2 text-center w-20 sm:w-24">Total</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="divide-y-2 divide-pink-50">
                                <!-- Baris tabel di-generate oleh JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <script>
        let frequencies = [0, 0, 0, 0, 0, 0]; 
        let totalRolls = 0;
        let isRolling = false;
        let currentRotX = 0;
        let currentRotY = 0;
        let myChart = null; 

        // Warna dadu pelangi untuk tabel
        const diceColors = ['#ff4757', '#1e90ff', '#2ed573', '#ffa502', '#9c88ff', '#ff7f50'];
        const diceFacesTable = ['&#9856;', '&#9857;', '&#9858;', '&#9859;', '&#9860;', '&#9861;'];

        document.addEventListener('DOMContentLoaded', () => {
            renderTable();
            initChart();
        });

        // Filter Dropdown
        function toggleViewFilter() {
            const filterValue = document.getElementById('view-filter').value;
            const chartCont = document.getElementById('chart-container');
            const tableCont = document.getElementById('table-container');

            if (filterValue === 'both') {
                chartCont.style.display = 'block'; tableCont.style.display = 'block';
            } else if (filterValue === 'chart') {
                chartCont.style.display = 'block'; tableCont.style.display = 'none';
            } else if (filterValue === 'table') {
                chartCont.style.display = 'none'; tableCont.style.display = 'block';
            }
        }

        // Generate Turus
        function generateTallyMarks(count) {
            if (count === 0) return ''; // Kosongkan jika 0
            
            let html = '<div class="flex flex-wrap gap-1.5 items-center py-0.5 min-h-[28px]">';
            let fullGroups = Math.floor(count / 5);
            let remainder = count % 5;
            
            const strokeColor = "#8b5cf6"; 
            
            const svg5 = `
                <svg width="24" height="24" viewBox="0 0 28 28" stroke="${strokeColor}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="4" x2="5" y2="24"/>
                    <line x1="10" y1="4" x2="10" y2="24"/>
                    <line x1="15" y1="4" x2="15" y2="24"/>
                    <line x1="20" y1="4" x2="20" y2="24"/>
                    <line x1="2" y1="24" x2="23" y2="4"/> 
                </svg>
            `;
            const svg1 = `
                <svg width="6" height="24" viewBox="0 0 6 28" stroke="${strokeColor}" stroke-width="3" stroke-linecap="round">
                    <line x1="3" y1="4" x2="3" y2="24"/>
                </svg>
            `;

            for (let i = 0; i < fullGroups; i++) { html += svg5; }
            for (let i = 0; i < remainder; i++) { html += svg1; }
            html += '</div>';
            return html;
        }

        // Chart.js
        function initChart() {
            const ctx = document.getElementById('frequencyChart').getContext('2d');
            Chart.defaults.font.family = "'Nunito', sans-serif";
            Chart.defaults.color = '#64748b';

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Satu', 'Dua', 'Tiga', 'Empat', 'Lima', 'Enam'],
                    datasets: [{
                        label: 'Frekuensi',
                        data: frequencies,
                        backgroundColor: [
                            'rgba(255, 71, 87, 0.8)',  // Merah
                            'rgba(30, 144, 255, 0.8)', // Biru
                            'rgba(46, 213, 115, 0.8)', // Hijau
                            'rgba(255, 165, 2, 0.8)',  // Oranye
                            'rgba(156, 136, 255, 0.8)',// Ungu
                            'rgba(255, 127, 80, 0.8)'  // Pink
                        ],
                        borderColor: [
                            '#ff4757', '#1e90ff', '#2ed573', '#ffa502', '#9c88ff', '#ff7f50'
                        ],
                        borderWidth: 3, 
                        borderRadius: 10, 
                        barPercentage: 0.7 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            border: { display: false },
                            grid: { color: '#f1f5f9', drawTicks: false },
                            ticks: { stepSize: 1, padding: 10, font: { size: 14, weight: 'bold' } }
                        },
                        x: {
                            border: { display: false },
                            grid: { display: false },
                            ticks: { padding: 10, font: { size: 14, weight: 'bold' } }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            padding: 16,
                            cornerRadius: 12,
                            displayColors: false,
                            titleFont: { size: 16, weight: 'bold', family: 'Nunito' },
                            bodyFont: { size: 20, weight: 'black', family: 'Nunito' }
                        }
                    },
                    animation: { duration: 600, easing: 'easeOutBounce' } 
                }
            });
        }

        function updateChart() {
            if (myChart) {
                myChart.data.datasets[0].data = frequencies;
                myChart.update();
            }
        }

        // Render Tabel
        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; 

            for (let i = 0; i < 6; i++) {
                const angka = i + 1;
                const jumlah = frequencies[i];
                const tr = document.createElement('tr');
                tr.id = `row-${angka}`;
                tr.className = 'transition-colors duration-500 hover:bg-pink-50/50'; 

                tr.innerHTML = `
                    <td class="px-4 sm:px-6 py-1.5 text-center border-r-2 border-pink-50">
                        <div class="flex flex-col items-center justify-center">
                            <span class="text-2xl sm:text-3xl" style="color: ${diceColors[i]}; line-height: 1;">${diceFacesTable[i]}</span>
                            <span class="font-black text-slate-700 text-sm sm:text-base mt-0.5">${angka}</span>
                        </div>
                    </td>
                    <td class="px-4 sm:px-6 py-1.5">${generateTallyMarks(jumlah)}</td>
                    <td class="px-4 sm:px-6 py-1.5 text-center border-l-2 border-pink-50">
                        <span class="inline-flex items-center justify-center w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-pink-100 text-pink-600 font-black text-base sm:text-lg border-2 border-pink-200">
                            ${jumlah}
                        </span>
                    </td>
                `;
                tbody.appendChild(tr);
            }
            document.getElementById('total-rolls-badge').innerText = `${totalRolls} Kali`;
        }

        function highlightRow(angka) {
            const row = document.getElementById(`row-${angka}`);
            row.classList.add('bg-pink-100'); 
            setTimeout(() => { row.classList.remove('bg-pink-100'); }, 800);
        }

        // Logika Lempar Dadu Cinematic
        function rollDice() {
            if (isRolling) return; 
            isRolling = true;
            
            const resultText = document.getElementById('result-text');
            const rollBtn = document.getElementById('roll-btn');
            const diceScene = document.getElementById('dice-scene');
            const diceScaler = document.getElementById('dice-scaler');
            const diceCube = document.getElementById('dice-cube');
            const overlay = document.getElementById('overlay');
            const dicePlaceholder = document.getElementById('dice-placeholder');
            
            // State tombol loading
            rollBtn.disabled = true;
            rollBtn.innerHTML = `⏳ Mengocok...`;
            resultText.innerHTML = `<span class="animate-pulse">Memutar dadu...</span>`;

            // Mulai animasi
            dicePlaceholder.style.display = 'block'; 
            diceScene.classList.add('cinematic');
            document.body.appendChild(diceScene); // Pindah paksa keluar div utama
            overlay.classList.add('active'); 

            // Hitung hasil acak
            const finalResultIndex = Math.floor(Math.random() * 6); 
            const angkaKeluar = finalResultIndex + 1;
            
            let targetX = 0, targetY = 0;
            switch(angkaKeluar) {
                case 1: targetX = 0; targetY = 0; break;      
                case 2: targetX = 0; targetY = -90; break;    
                case 3: targetX = -90; targetY = 0; break;    
                case 4: targetX = 90; targetY = 0; break;     
                case 5: targetX = 0; targetY = 90; break;     
                case 6: targetX = 180; targetY = 0; break;    
            }

            let spinsX = Math.floor(currentRotX / 360) + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 4) + 3);
            let spinsY = Math.floor(currentRotY / 360) + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 4) + 3);

            currentRotX = targetX + (spinsX * 360);
            currentRotY = targetY + (spinsY * 360);

            // JEDA PENTING: Browser butuh waktu sedikit (50ms) setelah memindahkan elemen (appendChild) 
            // agar animasi CSS transisi kocokan dadu bisa berjalan dengan mulus.
            setTimeout(() => {
                diceScaler.classList.add('cinematic-scale');
                diceCube.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
            }, 50);

            // Setelah animasi berputar selesai
            setTimeout(() => {
                overlay.classList.remove('active');
                diceScaler.classList.remove('cinematic-scale');
                diceScene.classList.remove('cinematic');
                
                // Kembalikan dadu ke tempat asal
                dicePlaceholder.parentNode.insertBefore(diceScene, dicePlaceholder);
                dicePlaceholder.style.display = 'none';

                resultText.innerHTML = `Hasil: <span class="font-black text-indigo-700 ml-1 text-lg">${angkaKeluar}</span>`;

                // Update skor
                frequencies[finalResultIndex]++;
                totalRolls++;
                renderTable();
                highlightRow(angkaKeluar);
                updateChart(); 

                isRolling = false;
                rollBtn.disabled = false;
                rollBtn.innerHTML = `🚀 LEMPAR DADU!`;
            }, 1600); 
        }

        // Reset Data
        function resetData() {
            if (totalRolls === 0) return;
            if (confirm("Yakin mau hapus semua skor dan mulai dari awal? 🤔")) {
                frequencies = [0, 0, 0, 0, 0, 0];
                totalRolls = 0;
                document.getElementById('result-text').innerHTML = `<span class="text-sm sm:text-base font-bold text-indigo-400">Pencet tombol di bawah 👇</span>`;
                currentRotX = 0;
                currentRotY = 0;
                document.getElementById('dice-cube').style.transform = `rotateX(0deg) rotateY(0deg)`;
                renderTable();
                updateChart(); 
            }
        }

        // Fullscreen Toggle
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Gagal membuka layar penuh: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const enterIcon = document.getElementById('fs-icon-enter');
            const exitIcon = document.getElementById('fs-icon-exit');
            const fsText = document.getElementById('fs-text');
            
            if (document.fullscreenElement) {
                enterIcon.classList.add('hidden');
                exitIcon.classList.remove('hidden');
                fsText.innerText = 'Keluar Penuh';
            } else {
                enterIcon.classList.remove('hidden');
                exitIcon.classList.add('hidden');
                fsText.innerText = 'Layar Penuh';
            }
        });
    </script>
</body>
</html>
