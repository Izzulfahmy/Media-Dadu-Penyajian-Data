<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Lempar Dadu & Analisis Data</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Base Scene Dadu 3D */
        .dice-scene {
            width: 90px;
            height: 90px;
            perspective: 1000px;
            margin: 2rem auto;
            position: relative; /* Penting untuk transisi ke full screen */
            z-index: 50; /* DIPERBARUI: Agar dadu selalu di atas overlay */
        }

        .dice-scaler {
            width: 100%;
            height: 100%;
            /* Transisi mulus untuk perubahan skala dan posisi */
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .dice-cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            /* Transisi untuk rotasi 3D */
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: rotateX(0deg) rotateY(0deg);
        }

        /* Desain Permukaan Dadu */
        .dice-face {
            position: absolute;
            width: 90px;
            height: 90px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.03), 0 4px 10px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 10px;
            justify-items: center;
            align-items: center;
            backface-visibility: hidden;
        }

        /* Posisi 3D Sisi Dadu */
        .dice-face.front  { transform: rotateY(0deg) translateZ(45px); }
        .dice-face.right  { transform: rotateY(90deg) translateZ(45px); }
        .dice-face.back   { transform: rotateY(180deg) translateZ(45px); }
        .dice-face.left   { transform: rotateY(-90deg) translateZ(45px); }
        .dice-face.top    { transform: rotateX(90deg) translateZ(45px); }
        .dice-face.bottom { transform: rotateX(-90deg) translateZ(45px); }

        /* Titik (Pips) */
        .pip {
            width: 16px;
            height: 16px;
            background: #1e293b;
            border-radius: 50%;
        }
        .face-1 .pip { grid-area: 2 / 2 / 3 / 3; background: #ef4444; width: 20px; height: 20px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .face-2 .p1 { grid-area: 1 / 3 / 2 / 4; } .face-2 .p2 { grid-area: 3 / 1 / 4 / 2; }
        .face-3 .p1 { grid-area: 1 / 3 / 2 / 4; } .face-3 .p2 { grid-area: 2 / 2 / 3 / 3; } .face-3 .p3 { grid-area: 3 / 1 / 4 / 2; }
        .face-4 .p1 { grid-area: 1 / 1 / 2 / 2; } .face-4 .p2 { grid-area: 1 / 3 / 2 / 4; } .face-4 .p3 { grid-area: 3 / 1 / 4 / 2; } .face-4 .p4 { grid-area: 3 / 3 / 4 / 4; }
        .face-5 .p1 { grid-area: 1 / 1 / 2 / 2; } .face-5 .p2 { grid-area: 1 / 3 / 2 / 4; } .face-5 .p3 { grid-area: 2 / 2 / 3 / 3; } .face-5 .p4 { grid-area: 3 / 1 / 4 / 2; } .face-5 .p5 { grid-area: 3 / 3 / 4 / 4; }
        .face-6 .p1 { grid-area: 1 / 1 / 2 / 2; } .face-6 .p2 { grid-area: 2 / 1 / 3 / 2; } .face-6 .p3 { grid-area: 3 / 1 / 4 / 2; } .face-6 .p4 { grid-area: 1 / 3 / 2 / 4; } .face-6 .p5 { grid-area: 2 / 3 / 3 / 4; } .face-6 .p6 { grid-area: 3 / 3 / 4 / 4; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* =========================================
           CINEMATIC MODE STYLES
           =========================================
        */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.85); /* Gelap transparan */
            backdrop-filter: blur(4px);
            z-index: 40; /* DIPERBARUI: Angka 40 agar dadu (50) bisa berada di atasnya */
            opacity: 0;
            pointer-events: none; /* Tidak bisa diklik saat tidak aktif */
            transition: opacity 0.4s ease;
        }
        
        #overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Kelas yang ditambahkan ke scene dadu saat mode cinematic */
        .dice-scene.cinematic {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 60;
        }

        /* Dadu membesar secara ekstrem saat di tengah layar */
        .dice-scaler.cinematic-scale {
            transform: scale(2.5) translateY(0);
        }

        /* Media query agar di HP tidak terlalu besar menutupi layar penuh */
        @media (max-width: 640px) {
            .dice-scaler.cinematic-scale {
                transform: scale(2) translateY(0);
            }
        }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen text-slate-800 antialiased selection:bg-slate-200">

    <!-- DIPERBARUI: Container utama dilepas dari ikatan relative z-10 -->
    <div class="max-w-6xl mx-auto py-8 px-5 sm:px-8 lg:py-12">
        
        <!-- Header -->
        <header class="mb-10 lg:mb-14 text-center lg:text-left">
            <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 tracking-tight">
                Simulasi Probabilitas Dadu
            </h1>
            <p class="mt-2 text-slate-500 text-sm sm:text-base max-w-2xl mx-auto lg:mx-0">
                Lakukan pengujian lempar dadu untuk mengumpulkan data frekuensi. Hasil akan divisualisasikan secara langsung.
            </p>
        </header>

        <!-- Layout Utama: Grid -->
        <main class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-10 items-start">
            
            <!-- KOLOM KIRI: Kontrol Dadu -->
            <!-- DIPERBARUI: Tambahkan z-50 di section ini agar dia membungkus overlay & dadu dengan prioritas tertinggi -->
            <section class="lg:col-span-4 lg:sticky lg:top-8 z-50 bg-white rounded-3xl shadow-sm border border-slate-200/60 p-6 sm:p-8 flex flex-col justify-between">
                
                <div class="flex flex-col items-center">
                    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Area Uji Coba</div>
                    
                    <!-- DIPERBARUI: Overlay dipindahkan ke dalam kontainer yang sama dengan dadu -->
                    <!-- OVERLAY UNTUK EFEK CINEMATIC -->
                    <div id="overlay"></div>

                    <!-- DADU CONTAINER -->
                    <!-- Placeholder untuk menahan posisi layout saat dadu terbang ke tengah layar -->
                    <div id="dice-placeholder" style="width: 90px; height: 90px; margin: 2rem auto; display: none;"></div>
                    
                    <div id="dice-scene" class="dice-scene">
                        <div id="dice-scaler" class="dice-scaler">
                            <div id="dice-cube" class="dice-cube">
                                <div class="dice-face front face-1"><div class="pip"></div></div>
                                <div class="dice-face right face-2"><div class="pip p1"></div><div class="pip p2"></div></div>
                                <div class="dice-face top face-3"><div class="pip p1"></div><div class="pip p2"></div><div class="pip p3"></div></div>
                                <div class="dice-face bottom face-4"><div class="pip p1"></div><div class="pip p2"></div><div class="pip p3"></div><div class="pip p4"></div></div>
                                <div class="dice-face left face-5"><div class="pip p1"></div><div class="pip p2"></div><div class="pip p3"></div><div class="pip p4"></div><div class="pip p5"></div></div>
                                <div class="dice-face back face-6"><div class="pip p1"></div><div class="pip p2"></div><div class="pip p3"></div><div class="pip p4"></div><div class="pip p5"></div><div class="pip p6"></div></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Hasil Teks -->
                    <div class="h-14 flex items-center justify-center w-full mt-2 mb-6 bg-slate-50 rounded-xl border border-slate-100 relative z-10">
                        <span id="result-text" class="text-sm font-medium text-slate-500">
                            Menunggu lemparan...
                        </span>
                    </div>

                    <!-- Tombol Lempar -->
                    <button id="roll-btn" onclick="rollDice()" class="w-full py-3.5 bg-slate-900 hover:bg-slate-800 active:transform active:scale-[0.98] transition-all text-white font-medium rounded-xl shadow-md shadow-slate-900/10 flex items-center justify-center gap-2 text-base relative z-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        Lempar Dadu
                    </button>
                </div>

                <hr class="border-slate-100 my-6 relative z-10">

                <button onclick="resetData()" class="w-full py-2.5 bg-white hover:bg-slate-50 text-slate-600 font-medium rounded-xl transition-colors flex items-center justify-center gap-2 border border-slate-200 text-sm relative z-10">
                    Reset Data
                </button>
            </section>

            <!-- KOLOM KANAN: Visualisasi Data -->
            <section class="lg:col-span-8 flex flex-col gap-8 relative z-0">
                
                <!-- Grafik Batang -->
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200/60 p-6 sm:p-8">
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <h2 class="text-lg font-semibold text-slate-900">Distribusi Frekuensi</h2>
                            <p class="text-xs text-slate-500 mt-1">Grafik kemunculan angka dadu</p>
                        </div>
                        <div class="bg-slate-100 text-slate-700 text-xs font-semibold px-3 py-1.5 rounded-lg flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full bg-slate-900 block"></span>
                            <span id="total-rolls-badge">0 Total</span>
                        </div>
                    </div>
                    
                    <div class="w-full h-[250px] sm:h-[300px] relative">
                        <canvas id="frequencyChart"></canvas>
                    </div>
                </div>

                <!-- Tabel Data -->
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200/60 overflow-hidden">
                    <div class="px-6 sm:px-8 py-5 border-b border-slate-100">
                        <h2 class="text-lg font-semibold text-slate-900">Tabel Rincian Data</h2>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="min-w-full text-sm text-left">
                            <thead class="bg-slate-50/50 text-slate-500 font-medium">
                                <tr>
                                    <th scope="col" class="px-6 sm:px-8 py-4 w-24">Angka</th>
                                    <th scope="col" class="px-6 sm:px-8 py-4">Sistem Turus</th>
                                    <th scope="col" class="px-6 sm:px-8 py-4 text-right w-28">Frekuensi</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-slate-100">
                                <!-- Baris tabel di-generate oleh JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <script>
        // Data State
        let frequencies = [0, 0, 0, 0, 0, 0]; 
        let totalRolls = 0;
        let isRolling = false;
        
        let currentRotX = 0;
        let currentRotY = 0;

        let myChart = null; 

        const diceFacesTable = ['&#9856;', '&#9857;', '&#9858;', '&#9859;', '&#9860;', '&#9861;'];

        document.addEventListener('DOMContentLoaded', () => {
            renderTable();
            initChart();
        });

        function generateTallyMarks(count) {
            let html = '<div class="flex flex-wrap gap-2 items-center py-1 min-h-[30px]">';
            let fullGroups = Math.floor(count / 5);
            let remainder = count % 5;
            const strokeColor = "#475569"; 
            
            const svg5 = `
                <svg width="24" height="24" viewBox="0 0 28 28" stroke="${strokeColor}" stroke-width="2.5" stroke-linecap="round">
                    <line x1="5" y1="4" x2="5" y2="24"/>
                    <line x1="10" y1="4" x2="10" y2="24"/>
                    <line x1="15" y1="4" x2="15" y2="24"/>
                    <line x1="20" y1="4" x2="20" y2="24"/>
                    <line x1="2" y1="24" x2="23" y2="4"/> 
                </svg>
            `;
            const svg1 = `
                <svg width="6" height="24" viewBox="0 0 6 28" stroke="${strokeColor}" stroke-width="2.5" stroke-linecap="round">
                    <line x1="3" y1="4" x2="3" y2="24"/>
                </svg>
            `;

            if (count === 0) return '<span class="text-slate-300 italic text-xs">Kosong</span>';

            for (let i = 0; i < fullGroups; i++) { html += svg5; }
            for (let i = 0; i < remainder; i++) { html += svg1; }
            html += '</div>';
            return html;
        }

        function initChart() {
            const ctx = document.getElementById('frequencyChart').getContext('2d');
            Chart.defaults.font.family = "'Inter', sans-serif";
            Chart.defaults.color = '#64748b';

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Satu', 'Dua', 'Tiga', 'Empat', 'Lima', 'Enam'],
                    datasets: [{
                        label: 'Frekuensi',
                        data: frequencies,
                        backgroundColor: '#1e293b',
                        borderRadius: 6,
                        barPercentage: 0.6 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            border: { display: false },
                            grid: { color: '#f1f5f9', drawTicks: false },
                            ticks: { stepSize: 1, padding: 10 }
                        },
                        x: {
                            border: { display: false },
                            grid: { display: false },
                            ticks: { padding: 10 }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#0f172a',
                            padding: 12,
                            cornerRadius: 8,
                            displayColors: false,
                            titleFont: { size: 13, weight: 'normal' },
                            bodyFont: { size: 14, weight: 'bold' }
                        }
                    },
                    animation: { duration: 500, easing: 'easeOutQuart' }
                }
            });
        }

        function updateChart() {
            if (myChart) {
                myChart.data.datasets[0].data = frequencies;
                myChart.update();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; 

            for (let i = 0; i < 6; i++) {
                const angka = i + 1;
                const jumlah = frequencies[i];
                const tr = document.createElement('tr');
                tr.id = `row-${angka}`;
                tr.className = 'transition-colors duration-500 hover:bg-slate-50/80 group'; 

                tr.innerHTML = `
                    <td class="px-6 sm:px-8 py-3">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl text-slate-700">${diceFacesTable[i]}</span>
                            <span class="font-medium text-slate-900">${angka}</span>
                        </div>
                    </td>
                    <td class="px-6 sm:px-8 py-3">${generateTallyMarks(jumlah)}</td>
                    <td class="px-6 sm:px-8 py-3 text-right">
                        <span class="inline-flex items-center justify-center px-2.5 py-1 rounded-md bg-slate-100 text-slate-700 font-semibold text-sm group-hover:bg-slate-200 transition-colors">
                            ${jumlah}
                        </span>
                    </td>
                `;
                tbody.appendChild(tr);
            }
            document.getElementById('total-rolls-badge').innerText = `${totalRolls} Total`;
        }

        function highlightRow(angka) {
            const row = document.getElementById(`row-${angka}`);
            row.classList.add('bg-blue-50/50'); 
            setTimeout(() => { row.classList.remove('bg-blue-50/50'); }, 800);
        }

        // LOGIKA CINEMATIC ROLL
        function rollDice() {
            if (isRolling) return; 
            isRolling = true;
            
            const resultText = document.getElementById('result-text');
            const rollBtn = document.getElementById('roll-btn');
            
            // Elemen untuk mode cinematic
            const diceScene = document.getElementById('dice-scene');
            const diceScaler = document.getElementById('dice-scaler');
            const diceCube = document.getElementById('dice-cube');
            const overlay = document.getElementById('overlay');
            const dicePlaceholder = document.getElementById('dice-placeholder');
            
            // 1. Ubah tombol ke state loading
            rollBtn.disabled = true;
            rollBtn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white opacity-80" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Mengocok...`;
            rollBtn.classList.add('opacity-90', 'cursor-not-allowed');
            resultText.innerHTML = `<span class="animate-pulse">Memutar dadu...</span>`;

            // 2. AKTIFKAN MODE CINEMATIC
            overlay.classList.add('active'); // Gelapkan background
            dicePlaceholder.style.display = 'block'; // Tahan layout yang ditinggalkan dadu
            
            // Beri jeda sangat kecil agar transisi posisi terlihat mulus (dari relatif ke fixed)
            setTimeout(() => {
                diceScene.classList.add('cinematic');
                diceScaler.classList.add('cinematic-scale');
            }, 50);

            // 3. Tentukan Hasil & Putaran
            const finalResultIndex = Math.floor(Math.random() * 6); 
            const angkaKeluar = finalResultIndex + 1;
            
            let targetX = 0, targetY = 0;
            switch(angkaKeluar) {
                case 1: targetX = 0; targetY = 0; break;      
                case 2: targetX = 0; targetY = -90; break;    
                case 3: targetX = -90; targetY = 0; break;    
                case 4: targetX = 90; targetY = 0; break;     
                case 5: targetX = 0; targetY = 90; break;     
                case 6: targetX = 180; targetY = 0; break;    
            }

            // Tambah putaran liar (lebih banyak putaran karena ada mode cinematic)
            let spinsX = Math.floor(currentRotX / 360) + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 4) + 3);
            let spinsY = Math.floor(currentRotY / 360) + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 4) + 3);

            currentRotX = targetX + (spinsX * 360);
            currentRotY = targetY + (spinsY * 360);

            // Putar dadu di tengah layar
            diceCube.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;

            // 4. SETELAH ANIMASI SELESAI (1.5 detik), KEMBALIKAN KE TEMPAT SEMULA
            setTimeout(() => {
                // Matikan mode cinematic
                overlay.classList.remove('active');
                diceScaler.classList.remove('cinematic-scale');
                diceScene.classList.remove('cinematic');
                dicePlaceholder.style.display = 'none';

                // Update teks hasil
                resultText.innerHTML = `Hasil: <span class="font-bold text-slate-900 ml-1 text-base">${angkaKeluar}</span>`;

                // Update Data & UI
                frequencies[finalResultIndex]++;
                totalRolls++;
                renderTable();
                highlightRow(angkaKeluar);
                updateChart(); 

                // Kembalikan tombol
                isRolling = false;
                rollBtn.disabled = false;
                rollBtn.classList.remove('opacity-90', 'cursor-not-allowed');
                rollBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg> Lempar Dadu`;
            }, 1600); // 1.6 detik (menyesuaikan durasi transisi css)
        }

        function resetData() {
            if (totalRolls === 0) return;
            if (confirm("Reset seluruh data pengujian?")) {
                frequencies = [0, 0, 0, 0, 0, 0];
                totalRolls = 0;
                document.getElementById('result-text').innerHTML = `<span class="text-sm font-medium text-slate-500">Menunggu lemparan...</span>`;
                currentRotX = 0;
                currentRotY = 0;
                document.getElementById('dice-cube').style.transform = `rotateX(0deg) rotateY(0deg)`;
                renderTable();
                updateChart(); 
            }
        }
    </script>
</body>
</html>
